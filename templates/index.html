<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
    <title>Obsazenost bazénu</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root[data-theme="dark"] {
            --bg: #000000;
            --bg-btn: transparent;
            --bg-btn-hover: #222;
            --border: #444;
            --text: #ffffff;
            --text-muted: #888;
            --bar-low:    rgba(75, 192, 192, 0.8);
            --bar-medium: #4CAF50CC;
            --bar-high:   #FF9800CC;
            --bar-full:   #F44336CC;
        }

        :root[data-theme="light"] {
            --bg: #f5f5f5;
            --bg-btn: transparent;
            --bg-btn-hover: #ddd;
            --border: #bbb;
            --text: #111111;
            --text-muted: #666;
            --bar-low:    rgba(75, 192, 192, 0.5);
            --bar-medium: #4CAF5066;
            --bar-high:   #FF980066;
            --bar-full:   #F4433666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            background: var(--bg);
            color: var(--text);
            transition: background 0.2s, color 0.2s;
        }

        h1 { margin-bottom: 8px; flex-shrink: 0; }

        #top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        #day-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        button {
            background: var(--bg-btn);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.15s;
        }

        button:hover:not(:disabled) { background: var(--bg-btn-hover); }
        button:disabled { opacity: 0.35; cursor: not-allowed; }

        #btn-theme {
            padding: 5px 10px;
            font-size: 16px;
            line-height: 1;
            border-radius: 6px;
        }

        #date-label {
            flex: 1;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
        }

        #chart-container {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        #status {
            flex-shrink: 0;
            font-size: 0.9em;
            color: var(--text-muted);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <h1>Obsazenost bazénu</h1>
        <button id="btn-theme" title="Přepnout motiv">🌙</button>
    </div>

    <div id="day-nav">
        <button id="btn-prev">← Předchozí</button>
        <span id="date-label"></span>
        <button id="btn-next">Další →</button>
    </div>

    <div id="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <div id="status">
        Poslední aktualizace: <span id="timestamp">--:--:--</span>
    </div>

    <script src="/static/chart.js"></script>
</body>
</html>
