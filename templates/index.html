<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
    <title>Obsazenost bazénu</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="top-bar">
        <h1>Obsazenost bazénu</h1>
        <button id="btn-theme" title="Přepnout motiv">🌙</button>
    </div>

    <div id="day-nav">
        <button id="btn-prev">← Předchozí</button>
        <span id="date-label"></span>
        <button id="btn-next">Další →</button>
    </div>

    <div id="chart-container">
        <div id="chart-legend" style="display:flex;gap:16px;justify-content:center;margin-bottom:8px;flex-wrap:wrap;"></div>
        <div id="no-data-msg" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:14px;color:var(--text-muted);">
            Pro tento den nejsou k dispozici žádná data.
        </div>
        <canvas id="chart"></canvas>
    </div>

    <div id="status">
        Poslední aktualizace: <span id="timestamp">--:--:--</span>
    </div>

    <script src="/static/chart.js"></script>
</body>
</html>
